repos:
- name: gron
  cmd: ir get https://github.com/tomnomnom/gron -n gron -y
  validate:
    cmd: gron --help
    grep: "Transform JSON"

- name: yt-dlp
  cmd: ir get https://github.com/yt-dlp/yt-dlp -n yt-dlp --file yt-dlp_linux -y
  validate:
    cmd: yt-dlp --help
    grep: "Usage: yt-dlp"

- name: ttyd
  cmd: ir get https://github.com/tsl0922/ttyd -n ttyd -y
  validate:
    cmd: ttyd --help
    grep: ttyd

- name: helm
  cmd: ir get mise@helm -y
  validate:
    cmd: helm version
    grep: "version.BuildInfo"

- name: kubectl
  cmd: ir get @mise/kubectl -n kubectl -y
  validate:
    cmd: kubectl version --client
    grep: 'Client Version:'

- name: terraform
  cmd: ir get docker@hashicorp/terraform -y
  validate:
    cmd: terraform version
    grep: "Terraform"
