name: PyPy Release
on:
  release:
    types: [published, edited]
  # push:
  #   branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8"]
        platform: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: tag name
        run: echo $GITHUB_REF_NAME

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
       
      - name: Config Poetry
        run: |
          # curl -sSL https://install.python-poetry.org | python3 -
          python -m pip install --upgrade pip
          python -m pip install poetry==1.8.4
          poetry install

      - name: Build Wheel
        run: poetry build

      - name: Install PyInstaller
        run: pip install pyinstaller==6.11.1

      - name: Build Executable
        run: |
          bash -c '
          source $(poetry env info --path)/bin/activate; 
          pip install pyinstaller==6.11.1; 
          pyinstaller --onefile --distpath dist/${{ matrix.platform }} InstallRelease/cli.py
          '
          
          # test the executable
          chmod +x dist/${{ matrix.platform }}/cli
          ./dist/${{ matrix.platform }}/cli --help

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: install-release-Linux-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}/cli
          
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.8"]
        platform: [arm64]
    steps:
      - uses: actions/checkout@v4

      - name: tag name
        run: echo $GITHUB_REF_NAME

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
       
      - name: Config Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==1.8.4
          poetry install

      - name: Build Wheel
        run: poetry build

      - name: Install PyInstaller
        run: pip install pyinstaller==6.11.1

      - name: Build Executable
        run: |
          bash -c '
          source $(poetry env info --path)/bin/activate; 
          pip install pyinstaller==6.11.1; 
          pyinstaller --onefile --distpath dist/${{ matrix.platform }} InstallRelease/cli.py
          '
          
          # test the executable
          chmod +x dist/${{ matrix.platform }}/cli
          ./dist/${{ matrix.platform }}/cli --help

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: install-release-macOS-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}/cli

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download Linux artifacts for arm64
      uses: actions/download-artifact@v4
      with:
        name: install-release-Linux-arm64
        path: dist/linux-arm64

    - name: Download Linux artifacts for amd64
      uses: actions/download-artifact@v4
      with:
        name: install-release-Linux-amd64
        path: dist/linux-amd64
        
    - name: Download macOS artifacts for arm64
      uses: actions/download-artifact@v4
      with:
        name: install-release-macOS-arm64
        path: dist/macos-arm64

    - name: Rename artifacts Before Upload
      run: |
        mv dist/linux-amd64/cli dist/linux-amd64/install-release-linux-amd64
        mv dist/linux-arm64/cli dist/linux-arm64/install-release-linux-arm64
        mv dist/macos-arm64/cli dist/macos-arm64/install-release-macos-arm64

    - name: Upload GitHub Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/linux-amd64/install-release-linux-amd64
          dist/linux-arm64/install-release-linux-arm64
          dist/macos-arm64/install-release-macos-arm64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Install pip and poetry
      run: |
        python -m pip install --upgrade pip
        python -m pip install poetry==1.8.4
        poetry install

    - name: Publish to PyPI
      run: |
        poetry build
        poetry config pypi-token.pypi ${{ secrets.PYPI_TOKEN }}
        poetry publish
